# Production UI: static React build + proxy /api to the host-side Matrix proxy.
# Default host port is 3002 (MATRIX_PROXY_PORT). If you change it, update proxy_pass below.
# Inference (llama-server, coordinator) runs on the host; only the UI is containerized.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header X-Frame-Options SAMEORIGIN always;

    # MS-143: /api/mlx/* now served by C++ coordinator on :3002 (MS-130 native port).
    # /api/orchestrate* proxied to orchestrate sidecar on :3003 via the C++ proxy.
    # All /api/ traffic flows through :3002 — no separate MLX Python process needed.
    location /api/ {
        proxy_pass http://host.docker.internal:3002/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
