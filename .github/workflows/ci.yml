# Sprint 44+: static CI gates — GitHub Actions Node 24 / setup-node@v6.
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-gates:
    runs-on: ubuntu-latest
    env:
      COFISWARM_REPOS_ROOT: ${{ github.workspace }}/cofiswarm/repos
    steps:
      - uses: actions/checkout@v6
        with:
          path: cofiswarm/repos/cofiswarm-deploy

      - uses: actions/checkout@v6
        with:
          repository: keepdevops/cofiswarm-common
          path: cofiswarm/repos/cofiswarm-common

      - uses: actions/checkout@v6
        with:
          repository: keepdevops/cofiswarm-ui
          path: cofiswarm/repos/cofiswarm-ui

      - uses: actions/checkout@v6
        with:
          repository: keepdevops/cofiswarm-gateway
          path: cofiswarm/repos/cofiswarm-gateway

      - uses: actions/checkout@v6
        with:
          repository: keepdevops/cofiswarm-grafana
          path: cofiswarm/repos/cofiswarm-grafana

      - uses: actions/checkout@v6
        with:
          repository: keepdevops/cofiswarm-e2e
          path: cofiswarm/repos/cofiswarm-e2e

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: cofiswarm/repos/cofiswarm-ui/package-lock.json

      - name: Static gates
        working-directory: cofiswarm/repos/cofiswarm-deploy
        run: make test-ci-static-gate
