# Optional observability — Prometheus :9090 + Grafana :3030.
# Requires host stack (observer :8016). Not started by `make up`.
name: cofiswarm-observability

services:
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: cofiswarm-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ${COFISWARM_DEPLOY_ROOT:-.}/config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 6

  grafana:
    image: grafana/grafana:11.3.0
    container_name: cofiswarm-grafana
    restart: unless-stopped
    ports:
      - "3030:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: dark
      GF_SECURITY_ALLOW_EMBEDDING: "true"
    volumes:
      - ${COFISWARM_REPOS_ROOT:?}/cofiswarm-grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ${COFISWARM_DEPLOY_ROOT:-.}/config/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ${COFISWARM_REPOS_ROOT}/cofiswarm-grafana/dashboards:/var/lib/grafana/dashboards:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      prometheus:
        condition: service_healthy
