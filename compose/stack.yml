# Cofiswarm stack — Docker observability plane (zmq-bridge, observer, gateway, ui).
# Config is sourced from the repos (no FHS dependency); runtime/logs use named volumes.
# Host infer + Go control plane: scripts/stack-up.sh (Metal / llama-server on host).
name: cofiswarm

services:
  # ZMQ carrier (the "one carrier"): ingress SUB :5556 collects swarm.* from component
  # PUBs, re-emits on egress PUB :5557; HTTP control plane on :5555. The final image does
  # not bundle spec/topics.yaml, so the topic set is mounted in and pointed at by
  # COFISWARM_ZMQ_TOPICS (otherwise startup log.Fatals on a missing topics file).
  zmq-bridge:
    build:
      context: ${COFISWARM_REPOS_ROOT:?}/cofiswarm-zmq-bridge
      dockerfile: Dockerfile
    image: cofiswarm-zmq-bridge:local
    container_name: cofiswarm-zmq-bridge
    restart: unless-stopped
    environment:
      COFISWARM_BUS: zmq
      COFISWARM_ZMQ_ADDR: tcp://*:5556        # ingress: component PUBs -> carrier
      COFISWARM_ZMQ_EGRESS_ADDR: tcp://*:5557 # egress: carrier -> observer SUB
      COFISWARM_ZMQ_TOPICS: /etc/cofiswarm/zmq/topics.yaml
    command: ["--listen", ":5555"]
    volumes:
      - ${COFISWARM_REPOS_ROOT}/cofiswarm-zmq-bridge/spec/topics.yaml:/etc/cofiswarm/zmq/topics.yaml:ro
    ports:
      - "5555:5555"   # HTTP control plane: /v1/publish, /v1/stream, /healthz
      - "5556:5556"   # ZMQ ingress wire
      - "5557:5557"   # ZMQ egress wire
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5555/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6

  # Telemetry hub: subscribes to the carrier's egress over ZMQ and republishes translated
  # presence/hello back via the bridge HTTP control plane. Roster/alerts at :8016/v1/observed.
  observer:
    build:
      context: ${COFISWARM_REPOS_ROOT:?}/cofiswarm-observer
      dockerfile: Dockerfile
    image: cofiswarm-observer:local
    # Namespaced to avoid colliding with other projects that name a container
    # "cofiswarm-observer". The compose service name stays "observer" (its network alias),
    # so intra-stack DNS and COFISWARM_BRIDGE_URL wiring are unaffected.
    container_name: cofiswarm-stack-observer
    restart: unless-stopped
    environment:
      COFISWARM_ZMQ_EGRESS_ADDR: tcp://zmq-bridge:5557 # subscribe to carrier egress
      COFISWARM_BRIDGE_URL: http://zmq-bridge:5555      # presence republish + SSE fallback
      # Docker-stats widget reads through the read-only socket proxy (no raw socket / root here).
      COFISWARM_DOCKER_HOST: http://docker-socket-proxy:2375
    volumes:
      # Observer plugins are repo-sourced (their canonical home; render-config.sh used to copy
      # these into FHS). Agent-log output goes to a Docker-managed named volume — no FHS.
      - ${COFISWARM_REPOS_ROOT}/cofiswarm-observer/plugins:/var/lib/cofiswarm/observer/plugins:ro
      - cofiswarm-observer-logs:/var/log/cofiswarm
    ports:
      - "8016:8016"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      zmq-bridge:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8016/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6

  # Hardened read-only Docker API proxy: the ONLY thing that touches the raw socket. It
  # exposes just GET /containers/* (CONTAINERS=1) with all writes blocked (POST=0), so the
  # observer reads per-container stats over TCP :2375 without a socket mount or root.
  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: cofiswarm-docker-proxy
    restart: unless-stopped
    environment:
      CONTAINERS: "1"   # GET /containers/json + /containers/{id}/stats (read only)
      POST: "0"         # block create/start/stop/exec/etc.
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  # WebSocket gateway for the Observer Panel: bridges browser dashboards (full-duplex
  # ws://) to the carrier — SUBs the egress :5557 for events, PUBs commands to the ingress
  # :5556 (guarded by COFISWARM_CMD_PREFIX). Dashboard + /ws on :8820.
  observer-gateway:
    build:
      context: ${COFISWARM_REPOS_ROOT:?}/cofiswarm-observer-gateway
      dockerfile: Dockerfile
    image: cofiswarm-observer-gateway:local
    container_name: cofiswarm-observer-gateway
    restart: unless-stopped
    environment:
      COFISWARM_ZMQ_EGRESS_ADDR: tcp://zmq-bridge:5557 # events in (SUB)
      COFISWARM_ZMQ_ADDR: tcp://zmq-bridge:5556         # commands out (PUB to ingress)
      COFISWARM_BRIDGE_URL: http://zmq-bridge:5555      # announce own presence to the observer
    ports:
      - "8820:8820"
    depends_on:
      zmq-bridge:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8820/healthz"]
      interval: 10s
      timeout: 5s
      retries: 6

  ui:
    build:
      context: ${COFISWARM_REPOS_ROOT:?}/cofiswarm-ui
      dockerfile: deploy/Dockerfile
    image: cofiswarm-ui:local
    container_name: cofiswarm-ui
    profiles: ["16gb", "32gb"]
    ports:
      - "3000:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on: []

volumes:
  cofiswarm-observer-logs:   # observer agent-log output (Docker-managed; replaces FHS /var/log)
