# Cofiswarm stack — Docker services with FHS bind mounts where applicable.
# Host infer + Go control plane: scripts/stack-up.sh (Metal / llama-server on host).
name: cofiswarm

x-fhs-volumes: &fhs-volumes
  - ${COFISWARM_FHS_ROOT:?}/etc/cofiswarm:/etc/cofiswarm:ro
  - ${COFISWARM_FHS_ROOT}/var/lib/cofiswarm:/var/lib/cofiswarm
  - ${COFISWARM_FHS_ROOT}/var/log/cofiswarm:/var/log/cofiswarm
  - ${COFISWARM_FHS_ROOT}/run/cofiswarm:/run/cofiswarm

services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: cofiswarm-pgvector
    profiles: ["8gb", "16gb", "32gb"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: matrix
      POSTGRES_PASSWORD: matrix
      POSTGRES_DB: matrix_rag
    ports:
      - "5433:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matrix -d matrix_rag"]
      interval: 5s
      timeout: 3s
      retries: 10

  ui:
    build:
      context: ${COFISWARM_REPOS_ROOT:?}/cofiswarm-ui
      dockerfile: deploy/Dockerfile
    image: cofiswarm-ui:local
    container_name: cofiswarm-ui
    profiles: ["16gb", "32gb"]
    ports:
      - "3000:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    depends_on: []

volumes:
  pgvector_data:
